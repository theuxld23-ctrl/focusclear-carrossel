[pytest]
# A suíte roda tanto como módulo (python -m tests.X, com main() imprimindo "... OK")
# quanto via pytest (pytest tests/). As funções test_* às vezes retornam o `state`
# pro runner main() encadear — sob pytest isso vira só um aviso benigno, silenciado
# aqui. O DeprecationWarning de utcnow vem do SQLAlchemy (default das colunas).
testpaths = tests
filterwarnings =
    ignore::pytest.PytestReturnNotNoneWarning
    ignore:.*datetime.datetime.utcnow.*:DeprecationWarning
